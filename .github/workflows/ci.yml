name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type Check, Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for some tools that inspect git history

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run ruff (lint)
        run: uv run ruff check .

      - name: Run ruff (format check)
        run: uv run ruff format --check .

      - name: Run mypy (type check)
        run: uv run mypy ingestion streaming orchestration || true
        # `|| true` for now — we have no Python files yet. Will tighten after Week 1.

      - name: Run pytest
        run: uv run pytest --cov --cov-report=xml --cov-report=term
        continue-on-error: true
        # continue-on-error for now — we have no tests yet. Will tighten after Week 1.

      - name: Verify no placeholders in README
        run: |
          if grep -nE "REPLACE_USER|TODO|FIXME|XXX" README.md; then
            echo "::error::Found placeholders in README.md"
            exit 1
          fi

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
