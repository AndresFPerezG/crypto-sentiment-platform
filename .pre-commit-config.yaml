# Pre-commit hooks — automatic quality checks before every commit
# Run manually: uv run pre-commit run --all-files
# Update versions: uv run pre-commit autoupdate

default_language_version:
  python: python3.12

repos:
  # ----- Built-in hooks (file hygiene) -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags (used by GH Actions, dbt)
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ----- Ruff: lint + format Python (replaces black, flake8, isort) -----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ----- Mypy: strict type checking -----
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10.0
          - pydantic-settings>=2.7.0
          - types-requests
        args: [--strict, --ignore-missing-imports]
        exclude: ^(tests/|docs/|infrastructure/)

  # ----- Gitleaks: scan for committed secrets -----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ----- Conventional Commits: enforce commit message format -----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # ----- Local hooks (custom) -----
  - repo: local
    hooks:
      - id: no-todo-or-fixme-in-readme
        name: no TODO/FIXME/REPLACE_USER in README
        entry: bash -c 'grep -nE "REPLACE_USER|TODO|FIXME|XXX" README.md && exit 1 || exit 0'
        language: system
        files: ^README\.md$
        pass_filenames: false
